services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: codna-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codna
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d codna"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: codna-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: codna-api
    env_file:
      - path: ./apps/api/.env
        required: false
    environment:
      APP_NAME: CodeDNA API
      APP_VERSION: 0.1.0
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/codna
      REDIS_URL: redis://redis:6379/0
      REPOSITORY_WORKSPACE_PATH: /var/lib/codna/repositories
      REPOSITORY_FILE_MAX_BYTES: 10485760
      REPOSITORY_FILE_DISCOVERY_LIMIT: 5000
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: 1536
      EMBEDDING_BATCH_SIZE: 64
      ANSWER_PROVIDER: ${ANSWER_PROVIDER:-openai}
      ANSWER_MODEL: ${ANSWER_MODEL:-gpt-5.4-mini}
      ANSWER_MAX_CONTEXT_CHUNKS: ${ANSWER_MAX_CONTEXT_CHUNKS:-5}
      ANSWER_MAX_RELATED_CHUNKS: ${ANSWER_MAX_RELATED_CHUNKS:-0}
      ANSWER_MAX_CONTEXT_CHARACTERS: 18000
      ANSWER_MAX_OUTPUT_TOKENS: 1600
      ANSWER_BUDGET_USD: ${ANSWER_BUDGET_USD:-4.00}
      LOG_LEVEL: INFO
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-codna-api}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health').read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_NAME: CodeDNA API
      APP_VERSION: 0.1.0
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/codna
      REDIS_URL: redis://redis:6379/0
      REPOSITORY_WORKSPACE_PATH: /var/lib/codna/repositories
      REPOSITORY_FILE_MAX_BYTES: 10485760
      REPOSITORY_FILE_DISCOVERY_LIMIT: 5000
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: 1536
      EMBEDDING_BATCH_SIZE: 64
      ANSWER_PROVIDER: ${ANSWER_PROVIDER:-openai}
      ANSWER_MODEL: ${ANSWER_MODEL:-gpt-5.4-mini}
      ANSWER_MAX_CONTEXT_CHUNKS: ${ANSWER_MAX_CONTEXT_CHUNKS:-5}
      ANSWER_MAX_RELATED_CHUNKS: ${ANSWER_MAX_RELATED_CHUNKS:-0}
      ANSWER_MAX_CONTEXT_CHARACTERS: 18000
      ANSWER_MAX_OUTPUT_TOKENS: 1600
      ANSWER_BUDGET_USD: ${ANSWER_BUDGET_USD:-4.00}
      LOG_LEVEL: INFO
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    container_name: codna-worker
    env_file:
      - path: ./apps/api/.env
        required: false
    environment:
      APP_NAME: CodeDNA API
      APP_VERSION: 0.1.0
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/codna
      REDIS_URL: redis://redis:6379/0
      REPOSITORY_WORKSPACE_PATH: /var/lib/codna/repositories
      REPOSITORY_FILE_MAX_BYTES: 10485760
      REPOSITORY_FILE_DISCOVERY_LIMIT: 5000
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: 1536
      EMBEDDING_BATCH_SIZE: 64
      LOG_LEVEL: INFO
      OTEL_SERVICE_NAME: ${OTEL_WORKER_SERVICE_NAME:-codna-worker}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - repository_data:/var/lib/codna/repositories
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* values are embedded in the browser bundle at build time.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
    container_name: codna-web
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8001}
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-false}
      OTEL_SERVICE_NAME: ${OTEL_WEB_SERVICE_NAME:-codna-web}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://host.docker.internal:4318}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  repository_data:
