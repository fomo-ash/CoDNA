receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 10000
    timeout: 10s

exporters:
  clickhousetraces:
    datasource: tcp://clickhouse:9000/signoz_traces
  clickhousemetricswriter:
    datasource: tcp://clickhouse:9000/signoz_metrics
  clickhouseogoldlogs:
    datasource: tcp://clickhouse:9000/signoz_logs

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhousetraces]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhousemetricswriter]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouseogoldlogs]
